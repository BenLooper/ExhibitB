baseURL = 'https://example.org/'
languageCode = 'en-us'
title = 'My New Hugo Project'

[module]
[[module.imports]]
  path = 'github.com/lordmathis/hugo-theme-nightfall'

theme = "hugo-theme-nightfall"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[pagination]
pagerSize = 3

[menu]
  [[menu.header]]
    name = "posts"
    weight = 1
    url = "posts" 
  [[menu.header]]
    name = "中文"
    weight = 1
    url = "中文"
  [[menu.header]]
    name = "about"
    weight = 0
    url = "about"

[params]
user = "ben"
hostname = "exhibitb.net"
sitedescription = "Welcome to the musuem of the mind"

# You can configure external links to open in new tabs by adding this parameter
openLinksInNewTab = true

displayDateFormat = "2006-01-02"

# Global metadata display settings
# Each can be overridden in individual post frontmatter
showMetadata = false       # Master switch for all metadata display
showPublishedDate = true  # Show published date on post page
showReadingTime = false    # Show reading time on post page
showTags = true           # Show tags on post page
showAuthors = false        # Show authors on post page
showCategories = true     # Show categories on post page

[params.author]
  name = "EXHIBIT B"  # Website and RSS feed author
  email = ""  # RSS feed email address
